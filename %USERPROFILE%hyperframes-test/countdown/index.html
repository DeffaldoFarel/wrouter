<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
      }
      body {
        font-family: "Inter", sans-serif;
      }

      /* Background gradient animation */
      #bg {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
      }

      /* Center content container */
      .scene-content {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
      }

      /* Each number */
      .countdown-number {
        font-size: 280px;
        font-weight: 900;
        color: #fff;
        text-align: center;
        opacity: 0;
        text-shadow: 
          0 0 40px rgba(99, 102, 241, 0.6),
          0 0 80px rgba(99, 102, 241, 0.3),
          0 0 120px rgba(99, 102, 241, 0.15);
        position: absolute;
        transform-origin: center center;
      }

      /* Ring pulse behind each number */
      .ring {
        position: absolute;
        width: 350px;
        height: 350px;
        border: 3px solid rgba(99, 102, 241, 0.4);
        border-radius: 50%;
        opacity: 0;
        transform-origin: center center;
      }

      /* Subtitle text */
      .subtitle {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 8px;
        text-transform: uppercase;
        color: rgba(99, 102, 241, 0.7);
        opacity: 0;
        text-align: center;
      }

      /* GO! text */
      .go-text {
        font-size: 200px;
        font-weight: 900;
        color: #10b981;
        text-align: center;
        opacity: 0;
        text-shadow: 
          0 0 40px rgba(16, 185, 129, 0.6),
          0 0 80px rgba(16, 185, 129, 0.3);
        position: absolute;
        transform-origin: center center;
      }

      /* Decorative corner elements */
      .corner {
        position: absolute;
        width: 60px;
        height: 60px;
        border: 2px solid rgba(99, 102, 241, 0.2);
      }
      .corner-tl { top: 80px; left: 80px; border-right: none; border-bottom: none; }
      .corner-tr { top: 80px; right: 80px; border-left: none; border-bottom: none; }
      .corner-bl { bottom: 80px; left: 80px; border-right: none; border-top: none; }
      .corner-br { bottom: 80px; right: 80px; border-left: none; border-top: none; }
    </style>
  </head>
  <body>
    <div id="bg"></div>
    
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="12"
      data-width="1920"
      data-height="1080"
    >
      <!-- Corner decorations -->
      <div class="corner corner-tl clip" data-start="0" data-duration="12" data-track-index="1"></div>
      <div class="corner corner-tr clip" data-start="0" data-duration="12" data-track-index="2"></div>
      <div class="corner corner-bl clip" data-start="0" data-duration="12" data-track-index="3"></div>
      <div class="corner corner-br clip" data-start="0" data-duration="12" data-track-index="4"></div>

      <!-- Subtitle -->
      <div class="subtitle clip" data-start="0" data-duration="12" data-track-index="5">Get Ready</div>

      <!-- Countdown numbers (5 to 1) -->
      <div class="countdown-number clip" id="num-5" data-start="0" data-duration="2" data-track-index="10">5</div>
      <div class="ring clip" id="ring-5" data-start="0" data-duration="2" data-track-index="11"></div>

      <div class="countdown-number clip" id="num-4" data-start="2" data-duration="2" data-track-index="20">4</div>
      <div class="ring clip" id="ring-4" data-start="2" data-duration="2" data-track-index="21"></div>

      <div class="countdown-number clip" id="num-3" data-start="4" data-duration="2" data-track-index="30">3</div>
      <div class="ring clip" id="ring-3" data-start="4" data-duration="2" data-track-index="31"></div>

      <div class="countdown-number clip" id="num-2" data-start="6" data-duration="2" data-track-index="40">2</div>
      <div class="ring clip" id="ring-2" data-start="6" data-duration="2" data-track-index="41"></div>

      <div class="countdown-number clip" id="num-1" data-start="8" data-duration="2" data-track-index="50">1</div>
      <div class="ring clip" id="ring-1" data-start="8" data-duration="2" data-track-index="51"></div>

      <!-- GO! text -->
      <div class="go-text clip" id="go" data-start="10" data-duration="2" data-track-index="60">GO!</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Subtitle entrance
      tl.fromTo(".subtitle", 
        { opacity: 0, y: -20 },
        { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" }, 0);
      
      tl.to(".subtitle", { opacity: 0.3, duration: 0.3 }, 1.5);

      // Corner decorations
      tl.fromTo(".corner", 
        { opacity: 0, scale: 0.5 },
        { opacity: 1, scale: 1, duration: 1, ease: "power2.out" }, 0);

      // Countdown: each number bounces in, holds, then exits
      const numbers = [
        { num: "#num-5", ring: "#ring-5", start: 0 },
        { num: "#num-4", ring: "#ring-4", start: 2 },
        { num: "#num-3", ring: "#ring-3", start: 4 },
        { num: "#num-2", ring: "#ring-2", start: 6 },
        { num: "#num-1", ring: "#ring-1", start: 8 },
      ];

      numbers.forEach((item, i) => {
        const s = item.start;
        
        // Ring pulse - expands and fades out
        tl.fromTo(item.ring,
          { opacity: 0.8, scale: 0.5 },
          { opacity: 0, scale: 2.5, duration: 1.2, ease: "power2.out" }, s);

        // Number bounces in (scale from 3 -> 1 with overshoot)
        tl.fromTo(item.num,
          { opacity: 0, scale: 3.5, rotation: -15 },
          { opacity: 1, scale: 1, rotation: 0, duration: 0.6, ease: "back.out(1.7)" }, s + 0.2);

        // Number pulse once after landing
        tl.to(item.num,
          { scale: 1.08, duration: 0.15, ease: "power1.inOut" }, s + 0.8);
        tl.to(item.num,
          { scale: 1, duration: 0.15, ease: "power1.inOut" }, s + 0.95);

        // Number exits - scales up and fades
        tl.to(item.num,
          { opacity: 0, scale: 1.5, duration: 0.4, ease: "power2.in" }, s + 1.5);
      });

      // GO! entrance
      tl.fromTo("#go",
        { opacity: 0, scale: 0.3, rotation: -10 },
        { opacity: 1, scale: 1, rotation: 0, duration: 0.5, ease: "back.out(2)" }, 10.1);

      // GO! pulse
      tl.to("#go", { scale: 1.1, duration: 0.2, ease: "power1.inOut" }, 10.6);
      tl.to("#go", { scale: 1, duration: 0.2, ease: "power1.inOut" }, 10.8);

      // GO! exit
      tl.to("#go", { opacity: 0, scale: 1.3, duration: 0.5, ease: "power2.in" }, 11.2);

      // Fade out subtitle at end
      tl.to(".subtitle", { opacity: 0, duration: 0.3 }, 11);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
