name: Docker Build

on:
  push:
    branches: [main, master]
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: wrouter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Test Docker image
        run: |
          docker run -d --name wrouter-test \
            -e JWT_SECRET=test \
            -e PORT=20128 \
            -p 20128:20128 \
            wrouter:latest
          sleep 10
          curl -f http://localhost:20128/api/health || exit 1
          docker stop wrouter-test
          docker rm wrouter-test
